services:
  mongodb:
    image: mongo:7.0-jammy
    container_name: rahfit_db
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  backend:
    build:
      context: ./backend
    container_name: rahfit_api
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - APP_ENV=production
      - RAHFIT_DEBUG=false
      - LOG_LEVEL=INFO
      - MONGODB_URI=mongodb://mongodb:27017
      - MONGODB_DATABASE=rahfit_ai
      - ALLOWED_ORIGINS=http://localhost:8080,http://127.0.0.1:8080
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - AI_FEATURE_ENABLED=${AI_FEATURE_ENABLED:-false}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/openapi.json"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_BASE_URL=/api/v1
    container_name: rahfit_web
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mongo_data:
